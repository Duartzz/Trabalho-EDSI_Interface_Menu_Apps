<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser Stopwatch</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --panel: #ffffff;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --border: #d2d2d7;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --danger: #ff3b30;
      --success: #34c759;
      --warning: #ff9500;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    [data-theme="dark"] {
      --bg: #1c1c1e;
      --panel: #2c2c2e;
      --text: #f5f5f7;
      --muted: #98989d;
      --border: #3a3a3c;
      --accent: #0a84ff;
      --accent-hover: #409cff;
      --danger: #ff453a;
      --success: #30d158;
      --warning: #ff9f0a;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(520px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 1.5rem;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .display {
      padding: 36px 24px 28px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .time {
      font: 700 3.5rem/1 "Consolas", "Courier New", monospace;
      letter-spacing: 0.04em;
      color: var(--text);
      user-select: none;
    }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status.running {
      color: var(--success);
    }

    .status.paused {
      color: var(--warning);
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: white;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    button:active:not(:disabled) {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    button.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.secondary:hover:not(:disabled) {
      background: rgba(127, 127, 127, 0.12);
    }

    button.danger {
      background: var(--danger);
    }

    button.success {
      background: var(--success);
    }

    .laps-section {
      padding: 0 24px 24px;
    }

    .laps-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 0 12px;
    }

    .laps-header h2 {
      margin: 0;
      font-size: 1rem;
    }

    .laps-header span {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .laps-list {
      max-height: 240px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .lap-item {
      display: grid;
      grid-template-columns: 48px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-family: "Consolas", "Courier New", monospace;
    }

    .lap-item:last-child {
      border-bottom: none;
    }

    .lap-number {
      color: var(--muted);
    }

    .lap-split {
      color: var(--text);
    }

    .lap-total {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .empty-laps {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    #themeBtn {
      padding: 8px 12px;
      font-size: 0.85rem;
      font-weight: 500;
      min-width: 96px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Browser Stopwatch</h1>
        <p class="subtitle">Track time with laps</p>
      </div>
      <button id="themeBtn" class="secondary">Dark Mode</button>
    </header>

    <div class="display">
      <div id="timeDisplay" class="time">00:00:00.00</div>
      <div id="statusText" class="status">Ready</div>
    </div>

    <div class="toolbar">
      <button id="startPauseBtn" class="success">Start</button>
      <button id="lapBtn" class="secondary" disabled>Lap</button>
      <button id="resetBtn" class="danger" disabled>Reset</button>
      <button id="clearLapsBtn" class="secondary" disabled>Clear Laps</button>
    </div>

    <div class="laps-section">
      <div class="laps-header">
        <h2>Laps</h2>
        <span id="lapCount">0 laps</span>
      </div>
      <div id="lapsList" class="laps-list">
        <div class="empty-laps">No laps yet</div>
      </div>
    </div>
  </div>

  <script>
    const THEME_KEY = "browser-stopwatch-theme";

    const timeDisplay = document.getElementById("timeDisplay");
    const statusText = document.getElementById("statusText");
    const startPauseBtn = document.getElementById("startPauseBtn");
    const lapBtn = document.getElementById("lapBtn");
    const resetBtn = document.getElementById("resetBtn");
    const clearLapsBtn = document.getElementById("clearLapsBtn");
    const lapsList = document.getElementById("lapsList");
    const lapCount = document.getElementById("lapCount");
    const themeBtn = document.getElementById("themeBtn");

    let startTime = 0;
    let elapsed = 0;
    let timerId = null;
    let running = false;
    let laps = [];
    let lastLapTime = 0;

    function formatTime(ms) {
      const totalCentiseconds = Math.floor(ms / 10);
      const centiseconds = totalCentiseconds % 100;
      const totalSeconds = Math.floor(totalCentiseconds / 100);
      const seconds = totalSeconds % 60;
      const totalMinutes = Math.floor(totalSeconds / 60);
      const minutes = totalMinutes % 60;
      const hours = Math.floor(totalMinutes / 60);

      return [
        String(hours).padStart(2, "0"),
        String(minutes).padStart(2, "0"),
        String(seconds).padStart(2, "0")
      ].join(":") + "." + String(centiseconds).padStart(2, "0");
    }

    function getCurrentElapsed() {
      return running ? elapsed + (Date.now() - startTime) : elapsed;
    }

    function updateDisplay() {
      timeDisplay.textContent = formatTime(getCurrentElapsed());
    }

    function setStatus(text, type = "") {
      statusText.textContent = text;
      statusText.className = "status" + (type ? " " + type : "");
    }

    function updateButtons() {
      startPauseBtn.textContent = running ? "Pause" : (elapsed > 0 ? "Resume" : "Start");
      startPauseBtn.className = running ? "secondary" : "success";

      lapBtn.disabled = !running;
      resetBtn.disabled = running || (elapsed === 0 && laps.length === 0);
      clearLapsBtn.disabled = laps.length === 0;
    }

    function renderLaps() {
      lapCount.textContent = laps.length === 1 ? "1 lap" : `${laps.length} laps`;

      if (laps.length === 0) {
        lapsList.innerHTML = '<div class="empty-laps">No laps yet</div>';
        return;
      }

      lapsList.innerHTML = laps
        .slice()
        .reverse()
        .map((lap) => `
          <div class="lap-item">
            <span class="lap-number">#${lap.number}</span>
            <span class="lap-split">+${formatTime(lap.split)}</span>
            <span class="lap-total">${formatTime(lap.total)}</span>
          </div>
        `)
        .join("");
    }

    function tick() {
      updateDisplay();
      timerId = requestAnimationFrame(tick);
    }

    function startStopwatch() {
      running = true;
      startTime = Date.now();
      setStatus("Running", "running");
      updateButtons();
      tick();
    }

    function pauseStopwatch() {
      elapsed = getCurrentElapsed();
      running = false;
      cancelAnimationFrame(timerId);
      setStatus("Paused", "paused");
      updateButtons();
      updateDisplay();
    }

    function resetStopwatch() {
      running = false;
      elapsed = 0;
      lastLapTime = 0;
      cancelAnimationFrame(timerId);
      updateDisplay();
      setStatus("Ready");
      updateButtons();
    }

    function addLap() {
      const total = getCurrentElapsed();
      const split = total - lastLapTime;
      lastLapTime = total;

      laps.push({
        number: laps.length + 1,
        split,
        total
      });

      renderLaps();
      updateButtons();
    }

    function clearLaps() {
      laps = [];
      lastLapTime = getCurrentElapsed();
      renderLaps();
      updateButtons();
    }

    function toggleStartPause() {
      running ? pauseStopwatch() : startStopwatch();
    }

    function setTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem(THEME_KEY, theme);
      themeBtn.textContent = theme === "dark" ? "Light Mode" : "Dark Mode";
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute("data-theme") || "light";
      setTheme(current === "dark" ? "light" : "dark");
    }

    startPauseBtn.addEventListener("click", toggleStartPause);
    lapBtn.addEventListener("click", addLap);
    resetBtn.addEventListener("click", resetStopwatch);
    clearLapsBtn.addEventListener("click", clearLaps);
    themeBtn.addEventListener("click", toggleTheme);

    document.addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        event.preventDefault();
        toggleStartPause();
      } else if (event.code === "KeyL" && running) {
        addLap();
      } else if (event.code === "KeyR" && !running) {
        resetStopwatch();
      }
    });

    setTheme(localStorage.getItem(THEME_KEY) || "light");
    updateButtons();
    updateDisplay();
  </script>
</body>
</html>
