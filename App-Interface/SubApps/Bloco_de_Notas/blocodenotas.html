<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser Notepad</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --panel: #ffffff;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --border: #d2d2d7;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --danger: #ff3b30;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    [data-theme="dark"] {
      --bg: #1c1c1e;
      --panel: #2c2c2e;
      --text: #f5f5f7;
      --muted: #98989d;
      --border: #3a3a3c;
      --accent: #0a84ff;
      --accent-hover: #409cff;
      --danger: #ff453a;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(900px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 48px);
    }

    header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      margin: 0 0 4px;
      font-size: 1.5rem;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      cursor: pointer;
      background: var(--accent);
      color: white;
      transition: background 0.2s ease;
    }

    button:hover {
      background: var(--accent-hover);
    }

    button.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.secondary:hover {
      background: rgba(127, 127, 127, 0.12);
    }

    button.danger {
      background: var(--danger);
    }

    .editor-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 24px 24px;
    }

    textarea {
      width: 100%;
      flex: 1;
      min-height: 420px;
      margin-top: 16px;
      padding: 18px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      color: var(--text);
      font: 16px/1.6 "Consolas", "Courier New", monospace;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
    }

    footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding-top: 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .status {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Browser Notepad</h1>
      <p class="subtitle">Simple notes that auto-save in your browser</p>
    </header>

    <div class="toolbar">
      <button id="newBtn">New</button>
      <button id="saveBtn">Save</button>
      <button id="downloadBtn" class="secondary">Download</button>
      <button id="clearBtn" class="danger">Clear</button>
      <button id="themeBtn" class="secondary">Dark Mode</button>
    </div>

    <div class="editor-wrap">
      <textarea
        id="editor"
        placeholder="Start typing your notes here..."
        spellcheck="true"
      ></textarea>

      <footer>
        <div class="status">
          <span id="charCount">Characters: 0</span>
          <span id="wordCount">Words: 0</span>
        </div>
        <span id="saveStatus">Ready</span>
      </footer>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "browser-notepad-content";
    const THEME_KEY = "browser-notepad-theme";

    const editor = document.getElementById("editor");
    const charCount = document.getElementById("charCount");
    const wordCount = document.getElementById("wordCount");
    const saveStatus = document.getElementById("saveStatus");
    const themeBtn = document.getElementById("themeBtn");

    function updateCounts() {
      const text = editor.value;
      const chars = text.length;
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;

      charCount.textContent = `Characters: ${chars}`;
      wordCount.textContent = `Words: ${words}`;
    }

    function saveNotes() {
      localStorage.setItem(STORAGE_KEY, editor.value);
      saveStatus.textContent = "Saved";
      setTimeout(() => {
        saveStatus.textContent = "Ready";
      }, 1200);
    }

    function loadNotes() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved !== null) {
        editor.value = saved;
      }
      updateCounts();
    }

    function downloadNotes() {
      const blob = new Blob([editor.value], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "notes.txt";
      link.click();
      URL.revokeObjectURL(url);
    }

    function clearNotes() {
      if (confirm("Clear all notes? This cannot be undone.")) {
        editor.value = "";
        localStorage.removeItem(STORAGE_KEY);
        updateCounts();
        saveStatus.textContent = "Cleared";
      }
    }

    function newNote() {
      if (editor.value && !confirm("Start a new note? Unsaved text will be lost.")) {
        return;
      }
      editor.value = "";
      localStorage.removeItem(STORAGE_KEY);
      updateCounts();
      editor.focus();
    }

    function setTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem(THEME_KEY, theme);
      themeBtn.textContent = theme === "dark" ? "Light Mode" : "Dark Mode";
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute("data-theme") || "light";
      setTheme(current === "dark" ? "light" : "dark");
    }

    editor.addEventListener("input", () => {
      updateCounts();
      saveNotes();
    });

    document.getElementById("newBtn").addEventListener("click", newNote);
    document.getElementById("saveBtn").addEventListener("click", saveNotes);
    document.getElementById("downloadBtn").addEventListener("click", downloadNotes);
    document.getElementById("clearBtn").addEventListener("click", clearNotes);
    themeBtn.addEventListener("click", toggleTheme);

    loadNotes();
    setTheme(localStorage.getItem(THEME_KEY) || "light");
    editor.focus();
  </script>
</body>
</html>
