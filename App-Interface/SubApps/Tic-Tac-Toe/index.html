<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo do Galo</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="bg-glow glow-a"></div>
  <div class="bg-glow glow-b"></div>
  <div class="bg-grid"></div>

  <main class="card">

    <header class="card-header">
      <h1>Jogo do <span class="accent">Galo</span></h1>

      <div class="mode-toggle" id="mode-toggle">
        <button class="mode-btn active" data-mode="1">1 Jogador</button>
        <button class="mode-btn" data-mode="2">2 Jogadores</button>
      </div>
    </header>

    <section class="scoreboard">
      <div class="score-item player-x" id="score-item-x">
        <span class="score-label">X</span>
        <span class="score-value" id="score-x">0</span>
      </div>
      <div class="score-item draw">
        <span class="score-label">Empates</span>
        <span class="score-value" id="score-d">0</span>
      </div>
      <div class="score-item player-o" id="score-item-o">
        <span class="score-label">O</span>
        <span class="score-value" id="score-o">0</span>
      </div>
    </section>

    <p class="status" id="status">Vez do <strong class="x-text">X</strong></p>

    <div class="board" id="board" data-current="X">
      <button class="cell" data-index="0" aria-label="Casa 1"></button>
      <button class="cell" data-index="1" aria-label="Casa 2"></button>
      <button class="cell" data-index="2" aria-label="Casa 3"></button>
      <button class="cell" data-index="3" aria-label="Casa 4"></button>
      <button class="cell" data-index="4" aria-label="Casa 5"></button>
      <button class="cell" data-index="5" aria-label="Casa 6"></button>
      <button class="cell" data-index="6" aria-label="Casa 7"></button>
      <button class="cell" data-index="7" aria-label="Casa 8"></button>
      <button class="cell" data-index="8" aria-label="Casa 9"></button>
    </div>

    <button class="reset-btn" id="reset-btn">Nova Partida</button>

  </main>

<script src="script.js"></script>
</body>
</html>
